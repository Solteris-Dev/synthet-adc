name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
        include:
          - os: macos-latest
            python-version: '3.12'
          - os: windows-latest
            python-version: '3.12'
    env:
      # The GUI tests run head-less; never try to open a real window/audio device.
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Qt/audio system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libportaudio2 libsndfile1

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Import smoke test
        run: python -c "import synthet; print('synthet', synthet.__version__)"

      - name: Core tests (DSP, envelopes, input matrix, engine)
        run: python tests/test_core.py

      - name: GUI tests (offscreen Qt)
        run: python tests/test_gui.py

      - name: Offline render (no audio device)
        run: python examples/render_demo.py

  # Single check to require in branch protection (green only if every matrix job passed).
  ci-ok:
    name: CI OK
    if: always()
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Verify all test jobs succeeded
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "test matrix result: ${{ needs.test.result }}"
            exit 1
          fi
          echo "all test jobs passed"
